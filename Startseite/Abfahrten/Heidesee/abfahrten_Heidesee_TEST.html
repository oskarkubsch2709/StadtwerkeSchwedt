body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* TOP BAR */

.green-bar {
  background-color: #008b45;
  color: white;
  padding: 10px 40px;
  display: flex;
  justify-content: space-between;
}

/* ÜBERSCHRIFT */

h1 {
  margin-left: 40px;
  color: #008b45;
}

/* TABELLENKOPF */

.table-header,
.departure {
  display: flex;
  justify-content: space-between;
  padding: 10px 40px;
  align-items: center;
}

.table-header {
  font-weight: bold;
  border-bottom: 2px solid black;
  background: #f0f0f0;
}

/* SPALTEN */

.line {
  min-width: 60px;
  text-align: center;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  padding: 4px;
}

.line-3 {
  background: red;
}

.line-e3 {
  background: white;
  color: red;
  border: 2px solid red;
}

.destination {
  flex: 1;
  margin-left: 20px;
}

.platform,
.countdown,
.delay {
  width: 80px;
  text-align: center;
}

/* INFO PANEL */

.info-panel {
  white-space: pre-line;
  margin-left: 90px;

  max-height: 0;
  overflow: hidden;
  opacity: 0;

  transition: all 0.4s ease;

  padding: 0 10px;
}

.info-panel.open {
  max-height: 1000px;
  opacity: 1;
  padding: 10px;
}

/* BLINKEN */

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}

.blinking {
  animation: blink 1s infinite;
}

</style>
</head>

/* =========================================================
   HILFSFUNKTIONEN
========================================================= */

function parseTimeToDate(dateBase, timeStr) {

  const [hour, minute] =
    timeStr.split(":").map(Number);

  return new Date(
    dateBase.getFullYear(),
    dateBase.getMonth(),
    dateBase.getDate(),
    hour,
    minute,
    0
  );
}

function generateDelay() {

  const rnd = Math.random();

  if (rnd < 0.70) return 0;

  if (rnd < 0.95) {
    return Math.floor(Math.random() * 3) + 1;
  }

  return Math.floor(Math.random() * 5) + 4;
}


/* =========================================================
   FAHRTVERLAUF
========================================================= */

function generateRouteInfo(entry) {

  const routeData = routes[entry.line];

  if (!routeData) {
    return "Kein Fahrtverlauf verfügbar.";
  }

  const route = routeData[entry.direction];

  if (!route) {
    return "Keine Richtung definiert.";
  }

  const startTime =
    parseTimeToDate(new Date(), entry.time);

  return route.map(stop => {

    const stopTime = new Date(
      startTime.getTime() + stop.offset * 60000
    );

    const h = stopTime
      .getHours()
      .toString()
      .padStart(2, "0");

    const m = stopTime
      .getMinutes()
      .toString()
      .padStart(2, "0");

    return `${h}:${m}  ${stop.stop}`;

  }).join("\n");
}

  }
}


/* =========================================================
   ABFAHRTEN
========================================================= */

window.departureDelays = new Map();

function updateDepartures() {

  const now = new Date();

  const todayBase = new Date(
    now.getFullYear(),
    now.getMonth(),
    now.getDate()
  );


  const allDepartures = weekdaySchedule.map(entry => {

    const key =
      `${entry.line}_${entry.time}_${entry.direction}`;

    if (!window.departureDelays.has(key)) {

      window.departureDelays.set(
        key,
        generateDelay()
      );
    }

    const delay =
      window.departureDelays.get(key);


    return {
      ...entry,

      delay,

      departureTime: new Date(
        parseTimeToDate(
          todayBase,
          entry.time
        ).getTime() + delay * 60000
      )
    };
  });


  const upcoming = allDepartures
    .filter(entry => entry.departureTime > now)
    .sort((a, b) => a.departureTime - b.departureTime);


  const container =
    document.getElementById("departures");

  container.innerHTML = "";


  upcoming.forEach(entry => {

    const row = document.createElement("div");

    row.className = "departure";


    /* LINIE */

    const line = document.createElement("div");

    if (entry.line === "3") {
      line.className = "line line-3";
    }
    else if (entry.line === "E3") {
      line.className = "line line-e3";
    }
    else {
      line.className = "line";
    }

    line.textContent = entry.line;


    /* ZIEL */

    const dest = document.createElement("div");

    dest.className = "destination";

    dest.textContent = entry.destination;


    /* STEIG */

    const platform =
      document.createElement("div");

    platform.className = "platform";

    platform.textContent =
      entry.platform;


    /* COUNTDOWN */

    const countdown =
      document.createElement("div");

    countdown.className = "countdown";

    const diffMs =
      entry.departureTime - now;

    const diffMin =
      Math.round(diffMs / 60000);


    if (diffMs >= 0 && diffMs < 60000) {

      countdown.textContent = "jetzt";

      countdown.classList.add("blinking");

    } else if (diffMin < 60) {

      countdown.textContent =
        `${diffMin} min`;

    } else {

      const h =
        entry.departureTime
          .getHours()
          .toString()
          .padStart(2, "0");

      const m =
        entry.departureTime
          .getMinutes()
          .toString()
          .padStart(2, "0");

      countdown.textContent =
        `${h}:${m}`;
    }


    /* VERSPÄTUNG */

    const delay =
      document.createElement("div");

    delay.className = "delay";

    delay.innerHTML =
      entry.delay > 0
        ? `<span style="color:red">+${entry.delay}</span>`
        : "";


    row.append(
      line,
      dest,
      platform,
      countdown,
      delay
    );

    container.appendChild(row);


    /* INFO PANEL */

    const infoPanel =
      document.createElement("div");

    infoPanel.className = "info-panel";


    let infoText =
      `Geplante Abfahrt: ${entry.time} Uhr`;


    if (entry.delay > 0) {

      const delayedH =
        entry.departureTime
          .getHours()
          .toString()
          .padStart(2, "0");

      const delayedM =
        entry.departureTime
          .getMinutes()
          .toString()
          .padStart(2, "0");

      infoText +=
        ` | heute: ${delayedH}:${delayedM}, +${entry.delay}`;
    }


    infoText +=
      `\n\n${getInfoTextForLine(entry.line)}`;

    infoText +=
      `\n\nFahrtverlauf:\n${generateRouteInfo(entry)}`;


    infoPanel.textContent = infoText;

    container.appendChild(infoPanel);


    row.addEventListener("click", () => {

      infoPanel.classList.toggle("open");
    });

  });
}


/* START */

updateDepartures();

setInterval(updateDepartures, 60000);

</script>
