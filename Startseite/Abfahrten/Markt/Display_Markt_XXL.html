<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abfahrtsanzeige XXL</title>

<style>
body {
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px;
    margin: 0;
}

.frame {
    background: #e6e6e6;
    border: 8px solid #333;
    padding: 15px 20px;
    border-radius: 12px;
    box-shadow: inset 0 0 10px #aaa, 0 10px 30px rgba(0,0,0,0.6);
    width: 900px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: Arial, sans-serif;
    margin-bottom: 5px;
}

.stop-name {
    font-size: 28px;
    font-weight: bold;
}

.platform {
    font-size: 22px;
}

.header-row {
    display: grid;
    grid-template-columns: 60px 1fr 80px;
    font-size: 18px;
    margin: 5px 0 10px 0;
    letter-spacing: 2px;
    font-family: Arial, sans-serif;
    color: #333;
}

/* 🔥 Container für Doppelanzeige */
.display-container {
    display: flex;
    gap: 10px;
    position: relative;
}

.display {
    flex: 1;
    background: black;
    padding: 20px;
    color: #ff9900;
    font-family: monospace;
    position: relative;
    background-image: radial-gradient(#222 1px, transparent 1px);
    background-size: 4px 4px;
}

.row {
    display: grid;
    grid-template-columns: 60px 1fr 80px;
    font-size: 28px;
    margin-bottom: 15px;
    letter-spacing: 2px;
    min-height: 32px;
}

.row div, .clock {
    text-shadow:
        0 0 3px #ff9900,
        0 0 6px #ff9900,
        0 0 12px #ff6600;
}

.blink {
    animation: blink 1s steps(1) infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

.clock {
    position: absolute;
    bottom: 5px;
    right: 10px;
    font-size: 18px;
    font-family: Arial, Helvetica, sans-serif;
}

/* Scroll */
.destination {
    overflow: hidden;
    white-space: nowrap;
}

.scroll-text {
    display: inline-block;
    white-space: nowrap;
}

@keyframes scroll-left {
    from {
        transform: translateX(var(--start));
    }
    to {
        transform: translateX(var(--end));
    }
}
</style>
</head>

<!-- ===================== -->
<!-- STEIG 1 -->
<!-- ===================== -->

<div class="frame">

// =======================
// Logik
// =======================

function getActiveTimetable() {
    const d = new Date().getDay();
    if (d === 0) return sundayTimetable;
    if (d === 6) return saturdayTimetable;
    return weekdayTimetable;
}

function toMinutes(t) {
    const [h,m] = t.split(":").map(Number);
    return h*60 + m;
}

function getCurrentMinutes() {
    const n = new Date();
    return n.getHours()*60 + n.getMinutes();
}

function getNextDepartures(platform) {
    const nowDate = new Date();
    const nowMinutes = nowDate.getHours() * 60 + nowDate.getMinutes();

    const today = getActiveTimetable();

    // 👉 Morgen bestimmen
    const tomorrowDate = new Date();
    tomorrowDate.setDate(nowDate.getDate() + 1);

    let tomorrow;
    const d = tomorrowDate.getDay();
    if (d === 0) tomorrow = sundayTimetable;
    else if (d === 6) tomorrow = saturdayTimetable;
    else tomorrow = weekdayTimetable;

    // 👉 Heute + Morgen kombinieren
    const combined = [
        ...today.map(d => ({
            ...d,
            absMinutes: toMinutes(d.time)
        })),
        ...tomorrow.map(d => ({
            ...d,
            absMinutes: toMinutes(d.time) + 1440 // 🔥 +24h
        }))
    ];

    return combined
        .filter(d => d.platform === platform)
        .map(d => ({
            ...d,
            minutesLeft: d.absMinutes - nowMinutes
        }))
        .filter(d => d.minutesLeft >= 0 && d.minutesLeft <= 60) // 🔥 nur 60 min
        .sort((a, b) => a.minutesLeft - b.minutesLeft)
        .slice(0, 6);
}

// 🔥 Split-Rendering
function renderDisplayPair(idA, idB, platform) {
    const deps = getNextDepartures(platform);

    const left = deps.slice(0,3);
    const right = deps.slice(3,6);

    renderSingle(idA, left);
    renderSingle(idB, right);
}

function renderSingle(id, list) {
    const el = document.getElementById(id);
    el.innerHTML = "";

    for (let i = 0; i < 3; i++) {
        const row = document.createElement("div");
        row.className = "row";

        if (list[i]) {
            const d = list[i];
            row.innerHTML = `
                <div>${d.line}</div>
                <div class="destination ${d.minutesLeft === 0 ? 'blink' : ''}">
                    <div class="scroll-text">${d.destination}</div>
                </div>
                <div>${d.minutesLeft === 0 ? "" : d.minutesLeft}</div>
            `;
        }

        el.appendChild(row);
    }
}

// =======================
// Scroll Engine
// =======================

const SCROLL_SPEED = 60;
const PAUSE = 2;
let cycleTimer = null;

function applyScrolling() {
    const elements = [...document.querySelectorAll(".scroll-text")];

    let maxDuration = 0;
    const configs = [];

    elements.forEach(el => {
        const parent = el.parentElement.offsetWidth;
        const text = el.scrollWidth;

        if (text > parent) {
            const start = parent;
            const end = -text;
            const duration = (start - end) / SCROLL_SPEED;

            if (duration > maxDuration) maxDuration = duration;

            configs.push({ el, start, end, duration });
        } else {
            el.style.animation = "none";
            el.style.transform = "translateX(0)";
        }
    });

    if (maxDuration === 0) return;

    if (cycleTimer) clearTimeout(cycleTimer);

    function startCycle() {
        configs.forEach(cfg => {
            const el = cfg.el;

            el.style.animation = "none";
            el.offsetHeight;

            el.style.setProperty("--start", cfg.start + "px");
            el.style.setProperty("--end", cfg.end + "px");

            el.style.animation = `scroll-left ${cfg.duration}s linear forwards`;
        });

        cycleTimer = setTimeout(startCycle, (maxDuration + PAUSE) * 1000);
    }

    startCycle();
}

// =======================
// Uhr
// =======================

function updateClock(id) {
    document.getElementById(id).textContent =
        new Date().toLocaleTimeString("de-DE", {
            hour: "2-digit",
            minute: "2-digit"
        });
}

// =======================
// LOOP
// =======================

setInterval(() => {
    const now = new Date();

    if (now.getSeconds() === 0) {
        renderDisplayPair("departures1a", "departures1b", "1");
        renderDisplayPair("departures2a", "departures2b", "2");

        setTimeout(applyScrolling, 50);
    }

    updateClock("clock1");
    updateClock("clock2");

}, 1000);

// Initial
renderDisplayPair("departures1a", "departures1b", "1");
renderDisplayPair("departures2a", "departures2b", "2");
setTimeout(applyScrolling, 100);

updateClock("clock1");
updateClock("clock2");

</script>
